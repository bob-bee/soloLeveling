<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Leveling Infinity Viewer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b0c10; color: #c5a059; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        
        /* Control Panel */
        #toolbar { position: fixed; top: 0; left: 0; width: 100%; background: rgba(11, 12, 16, 0.95); border-bottom: 2px solid #1f2833; display: flex; align-items: center; justify-content: center; gap: 20px; padding: 12px; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
        select, button { background: #1f2833; color: #45f3ff; border: 1px solid #45f3ff; padding: 8px 16px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.2s ease; }
        select:hover, button:hover { background: #45f3ff; color: #1f2833; box-shadow: 0 0 10px #45f3ff; }
        .scroll-control { display: flex; align-items: center; gap: 8px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #66fcf1; }
        input[type="range"] { accent-color: #45f3ff; cursor: pointer; }

        /* Manga Canvas Area */
        #manga-container { margin-top: 70px; display: flex; flex-direction: column; align-items: center; width: 100%; min-height: 100vh; }
        .manga-strip { width: 100%; max-width: 800px; height: auto; display: block; filter: contrast(1.05); box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        
        /* Status Message Overlay */
        #status-msg { margin: 100px auto; font-size: 18px; color: #66fcf1; text-align: center; }
    </style>
</head>
<body>

    <div id="toolbar">
        <select id="chapter-select" onchange="loadChapter(this.value)">
            <option value="">-- Choose Chapter --</option>
        </select>

        <button id="play-btn" onclick="toggleAutoScroll()">▶ Auto Scroll</button>
        
        <div class="scroll-control">
            <span>Speed:</span>
            <input type="range" id="speed-slider" min="1" max="10" value="3" onchange="updateSpeed()">
        </div>
    </div>

    <div id="manga-container">
        <div id="status-msg">Please select a chapter to begin leveling up...</div>
    </div>

    <script>
        let scrollInterval = null;
        let isScrolling = false;
        let scrollSpeed = 3;

        // Automatically populated assuming your compiled file paths match output naming conventions
        // Change the loop range values to match whatever chapters you downloaded!
        const selectMenu = document.getElementById('chapter-select');
        for (let i = 1; i <= 10; i++) {
            const opt = document.createElement('option');
            opt.value = `chapter_${i}/merged/chapter_${i}_seamless.png`;
            opt.innerHTML = `Chapter ${i}`;
            selectMenu.appendChild(opt);
        }

        function loadChapter(imagePath) {
            const container = document.getElementById('manga-container');
            if (!imagePath) {
                container.innerHTML = '<div id="status-msg">Please select a chapter to begin leveling up...</div>';
                return;
            }
            
            container.innerHTML = `Loading Chapter Canvas...`;
            
            // Generate clean frame element mapping directly to your seamless stitched file
            const img = new Image();
            img.className = 'manga-strip';
            img.src = imagePath;
            img.onload = () => {
                container.innerHTML = '';
                container.appendChild(img);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            img.onerror = () => {
                container.innerHTML = `<div id="status-msg" style="color: #ff4d4d;">❌ Image path not found.<br>Make sure you ran mergePanels.py for this chapter!</div>`;
            };
        }

        function toggleAutoScroll() {
            const btn = document.getElementById('play-btn');
            if (isScrolling) {
                clearInterval(scrollInterval);
                btn.innerHTML = "▶ Auto Scroll";
                btn.style.background = "#1f2833";
                btn.style.color = "#45f3ff";
            } else {
                scrollInterval = setInterval(() => {
                    window.scrollBy(0, scrollSpeed);
                }, 30);
                btn.innerHTML = "⏸ Pause";
                btn.style.background = "#ff4d4d";
                btn.style.color = "#ffffff";
                btn.style.border = "1px solid #ff4d4d";
            }
            isScrolling = !isScrolling;
        }

        function updateSpeed() {
            scrollSpeed = parseInt(document.getElementById('speed-slider').value);
            // If running, hot-reload the scrolling frame speed configuration instantly
            if (isScrolling) {
                toggleAutoScroll();
                toggleAutoScroll();
            }
        }

        // Add keyboard shortcuts (Spacebar toggles scrolling play/pause condition)
        window.addEventListener('keydown', (e) => {
            if (e.code === "Space") {
                e.preventDefault();
                toggleAutoScroll();
            }
        });
    </script>
</body>
</html>
